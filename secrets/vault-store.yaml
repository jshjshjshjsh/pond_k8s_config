# secrets/vault-store.yaml
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: pond
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: pond
stringData:
  # dev 모드이므로 지정한 고정 토큰을 그대로 사용
  token: "root"
